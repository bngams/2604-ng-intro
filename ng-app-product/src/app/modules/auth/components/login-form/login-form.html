<mat-card>
  <mat-card-header>
    <mat-card-title>Connexion</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Nom d'utilisateur</mat-label>
        <input matInput formControlName="username" placeholder="Entrez votre nom d'utilisateur" />
        <mat-icon matPrefix>person</mat-icon>
        <mat-error *ngIf="usernameControl?.hasError('required')">
          Le nom d'utilisateur est requis
        </mat-error>
        <mat-error *ngIf="usernameControl?.hasError('minlength')">
          Minimum 3 caractères
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Mot de passe</mat-label>
        <input
          matInput
          [type]="hidePassword ? 'password' : 'text'"
          formControlName="password"
          placeholder="Entrez votre mot de passe"
        />
        <mat-icon matPrefix>lock</mat-icon>
        <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
          <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
        </button>
        <mat-error *ngIf="passwordControl?.hasError('required')">
          Le mot de passe est requis
        </mat-error>
        <mat-error *ngIf="passwordControl?.hasError('minlength')">
          Minimum 4 caractères
        </mat-error>
      </mat-form-field>

      <div class="actions">
        <button mat-raised-button color="primary" type="submit" [disabled]="!loginForm.valid">
          <mat-icon>login</mat-icon>
          Se connecter
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
